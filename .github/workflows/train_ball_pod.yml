name: train-ball-pod
on:
  workflow_dispatch:
    inputs:
      confirmation: {required: true, type: string}
      max_hourly_cost: {required: true, default: '0.80', type: string}
      max_runtime_minutes: {required: true, default: '120', type: string}
concurrency:
  group: oneframe-ball-training
  cancel-in-progress: false
jobs:
  train:
    if: ${{ inputs.confirmation == 'TRAIN_BALL_T3' }}
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with: {registry: docker.io, username: '${{ secrets.DOCKERHUB_USERNAME }}', password: '${{ secrets.DOCKERHUB_TOKEN }}'}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ai_worker_v1/training/pod_runner/Dockerfile
          platforms: linux/amd64
          push: true
          tags: oneframecontent/oneframe-ai-worker-v1:train-${{ github.sha }}
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install boto3
      - name: dry run
        env: {RUNPOD_API_KEY: '${{ secrets.RUNPOD_API_KEY }}', R2_ENDPOINT: '${{ secrets.R2_ENDPOINT }}', R2_ACCESS_KEY_ID: '${{ secrets.R2_ACCESS_KEY_ID }}', R2_SECRET_ACCESS_KEY: '${{ secrets.R2_SECRET_ACCESS_KEY }}', R2_INPUT_BUCKET: '${{ secrets.R2_INPUT_BUCKET }}', R2_OUTPUT_BUCKET: '${{ secrets.R2_OUTPUT_BUCKET }}'}
        run: python ai_worker_v1/scripts/runpod_train_controller.py --dry-run
      - name: execute
        env: {RUNPOD_API_KEY: '${{ secrets.RUNPOD_API_KEY }}', R2_ENDPOINT: '${{ secrets.R2_ENDPOINT }}', R2_ACCESS_KEY_ID: '${{ secrets.R2_ACCESS_KEY_ID }}', R2_SECRET_ACCESS_KEY: '${{ secrets.R2_SECRET_ACCESS_KEY }}', R2_INPUT_BUCKET: '${{ secrets.R2_INPUT_BUCKET }}', R2_OUTPUT_BUCKET: '${{ secrets.R2_OUTPUT_BUCKET }}', TRAINING_IMAGE: 'oneframecontent/oneframe-ai-worker-v1:train-${{ github.sha }}'}
        run: python ai_worker_v1/scripts/runpod_train_controller.py --execute
      - name: cleanup
        if: always()
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          pip install boto3
          python ai_worker_v1/scripts/runpod_train_controller.py --cleanup-only
